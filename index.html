<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORMULARIO</title>
<style>
    
    body {
      font-family: Verdana, sans-serif;
      background: #eef2f7;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .form-box {
      background: #fff;
      padding: 20px;
      border-radius: 6px;
      box-shadow: 0 3px 6px rgba(0,0,0,0.1);
      width: 320px;
    }
    h2 {
      text-align: center;
      color: #444;
      margin-bottom: 15px;
    }
    label {
      font-weight: bold;
      color: #555;
    }
    input {
      width: 100%;
      padding: 7px;
      margin: 6px 0 14px 0;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 15px;
      cursor: pointer;
    }
    button:hover {
      background: #218838;
    }
  </style>



</head>
<body>

    <div class="form-box">
    <h2>Formulario de Registro</h2>
    <form action="recepcion.php" method="POST">
      <label for="datoNombre">Nombre:</label>
      <input type="text" id="datoNombre" name="datoNombre" required>

      <label for="datoApellido">Apellido:</label>
      <input type="text" id="datoApellido" name="datoApellido" required>

      <label for="datoEdad">Edad:</label>
      <input type="number" id="datoEdad" name="datoEdad" min="1" required>

      <button type="submit">Enviar</button>
    </form>
  </div>
    
</body>
</html>
