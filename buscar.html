<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

 <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .search-container {
      background: #fff;
      padding: 25px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 350px;
    }
    h2 {
      text-align: center;
      color: #333;
      margin-bottom: 20px;
    }
    label {
      font-weight: bold;
      color: #555;
    }
    input, select {
      width: 100%;
      padding: 8px;
      margin: 8px 0 16px 0;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
  </style>

</head>
<body>
    <div class="search-container">
    <h2>Buscador de Temas PHP</h2>
    <form action="resultado.php" method="GET">
      <label for="datoBusqueda">¿ingrese lo que desea buscar?</label>
      <input type="text" id="datoBusqueda" name="datoBusqueda" required>

      <label for="tipoBusqueda">Tipo:</label>
      <select id="tipoBusqueda" name="tipoBusqueda">
        <option value="funcion">Definicion</option>
        <option value="concepto">Concepto</option>
      </select>

      <button type="submit">Buscar</button>
    </form>
  </div>
</body>
</html>
